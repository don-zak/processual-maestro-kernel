services:
  api:
    build: .
    container_name: processual-maestro-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_LOG_LEVEL=info
      - ENVIRONMENT=production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - PROCESSUAL_CRYPTO_KEY_B64=${PROCESSUAL_CRYPTO_KEY_B64:?PROCESSUAL_CRYPTO_KEY_B64 is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - API_KEYS=${API_KEYS:?API_KEYS is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-opencode}
      - OPENCODE_API_URL=${OPENCODE_API_URL:-http://host.docker.internal:11434/v1}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-ollama-local}
      - OPENCODE_DEFAULT_MODEL=${OPENCODE_DEFAULT_MODEL:-qwen3-coder:30b}
      - RATE_LIMIT_ENABLED=true
      - AUDIT_ENABLED=true
    volumes:
      - api_data:/app/processual_api/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: processual-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: processual-db
    environment:
       POSTGRES_DB: ${POSTGRES_DB:-processual_db}
       POSTGRES_USER: ${POSTGRES_USER:-processual}
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-processual} -d ${POSTGRES_DB:-processual_db}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: processual-prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9090/-/healthy", "-O", "/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: processual-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    depends_on:
      - prometheus

volumes:
  pgdata:
  api_data:

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
