apiVersion: apps/v1
kind: Deployment
metadata:
  name: processual-maestro
  namespace: processual
  labels:
    app: processual-maestro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processual-maestro
  template:
    metadata:
      labels:
        app: processual-maestro
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: processual-maestro:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: processual-secrets
                  key: sentry-dsn
                  optional: true
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: processual-secrets
                  key: discord-webhook-url
                  optional: true
            - name: PROCESSUAL_CRYPTO_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: processual-secrets
                  key: crypto-key-b64
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
