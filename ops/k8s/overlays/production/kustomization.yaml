apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: processual
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: processual-maestro
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/2
        value:
          name: SENTRY_ENVIRONMENT
          value: "production"
