name: CI (Private monorepo)

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install full (private) package
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,api,observability,security,database,cache,reports,llm]

      - name: Verify private modules present
        run: |
          python -c "
          from cgtlib.private import compute
          print(f'OK: private compute loaded ({compute.__file__})')
          "

      - name: Ruff check
        run: ruff check . --output-format=github

      - name: Flake8
        run: flake8 . --count --max-complexity=15 --statistics

      - name: Mypy
        run: mypy cgtlib processual_kernel processual_api

      - name: Unit tests with coverage
        run: |
          pytest --cov=cgtlib --cov=processual_kernel --cov=processual_api \
            --cov-report=xml --cov-report=term-missing -q

      - name: Security scan (Bandit)
        run: bandit -r cgtlib processual_kernel processual_api

      - name: Build packages
        run: |
          python -m build
          python -m build --outdir dist/private cgtlib/

      - name: Check package metadata
        run: python -m twine check dist/*
