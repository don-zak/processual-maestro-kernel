name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,security]

      - name: Bandit security scan
        run: bandit -r cgtlib processual_kernel processual_api -f json -o bandit-report.json

      - name: Pip audit
        run: pip-audit
