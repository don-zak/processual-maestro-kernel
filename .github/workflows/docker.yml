name: Docker Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Build target (public|private)"
        required: true
        default: "private"
        type: choice
        options: [public, private]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.target)) || fromJSON('["private"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.target }})
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          target: ${{ matrix.target }}
          tags: |
            ${{ matrix.target == 'public' && format('ghcr.io/{0}/processual-maestro-public:{1}', github.repository_owner, github.ref_name) || format('ghcr.io/{0}/processual-maestro:{1}', github.repository_owner, github.ref_name) }}
            ${{ matrix.target == 'public' && format('ghcr.io/{0}/processual-maestro-public:latest', github.repository_owner) || format('ghcr.io/{0}/processual-maestro:latest', github.repository_owner) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
